{% extends "base.html" %}
{% block content %}
  <h1>Projects</h1>
  <p>Here are projects that I have worked on.  You can find more information about each project below.</p>
  <ul>
    {% for project in projects %}
      <li class="mb-4" style="list-style-type: none;">
        <h2>{{ project.title }}</h2>
        <p>{{ project.description }}</p>
        <a href="{{ project.link }}">View Project</a>
      </li>
    {% endfor %}
  </ul>
{% endblock %}
