{% extends "base.html" %}
{% block content %}
  <section class="hero">
    <div class="container">
      <div class="hero-inner">
        <div class="hero-copy">
          <h1 class="hero-title">Projects</h1>
          <p class="hero-sub">Here are projects that I have worked on. You can find more information about each project below.</p>
        </div>
      </div>
    </div>
  </section>
  <section class="projects-section">
     <div class="grid">
      {% for project in projects %}
      <article class="card">
        <a href="{{ project.link }}">
          <div class="card-body">
            <h3>{{ project.title }}</h3>
            <p class="muted">{{ project.description }}</p>
            <div class="mt-3"><span class="btn btn-ghost">View Project</span></div>
          </div>
        </a>
      </article>
      {% endfor %}
    </div>
  </section>
{% endblock %}
