{% extends "base.html" %}
{% block content %}
  <section class="container">
    <h1>Projects</h1>
    <p>Here are projects that I have worked on. You can find more information about each project below.</p>
    <div class="grid">
      {% for project in projects %}
      <article class="card">
        <a href="{{ project.link }}">
          <div class="card-body">
            <h3>{{ project.title }}</h3>
            <p class="muted">{{ project.description }}</p>
            <div class="mt-3"><span class="btn btn-ghost">View Project</span></div>
          </div>
        </a>
      </article>
      {% endfor %}
    </div>
  </section>
{% endblock %}
