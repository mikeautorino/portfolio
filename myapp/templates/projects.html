{% extends "base.html" %}
{% block content %}
  <section class="hero reveal">
    <div class="container">
      <div class="hero-inner">
        <div class="hero-copy">
          <h1 class="hero-title">Projects</h1>
          <p class="hero-sub">Here are projects that I have worked on. You can find more information about each project below.</p>
        </div>
      </div>
    </div>
  </section>

  <!-- SEO Meta Tags -->
  <meta name="description" content="Explore my portfolio of projects.">
  <meta name="keywords" content="projects, work, portfolio, web development, software engineering">
  <meta name="robots" content="index, follow">

  <!-- Structured Data for Projects -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ItemList",
      "name": "Projects",
      "itemListElement": [
      {% for project in projects %}
          {
            "@type": "ListItem",
            "position": {{ loop.index }},
            "name": "{{ project.title }}",
            "description": "{{ project.description }}",
            "url": "{{ project.link }}"
          }{% if not loop.last %},{% endif %}
      {% endfor %}
      ]
    }
  </script>

  <section class="projects-section reveal">
     <div class="grid">
      {% for project in projects %}
      <article class="card">
        <a href="{{ project.link }}">
          <div class="card-body">
            <h3>{{ project.title }}</h3>
            <p class="muted">{{ project.description }}</p>
            <div class="mt-3"><span class="btn btn-ghost">View Project</span></div>
          </div>
        </a>
      </article>
      {% endfor %}
    </div>
  </section>
{% endblock %}
