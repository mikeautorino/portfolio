{% extends "base.html" %}
{% block content %}
  <section class="hero reveal">
    <div class="container">
      <div class="hero-inner">
        <div class="hero-copy">
          <h1 class="hero-title">Contact Me</h1>
          <p class="hero-sub">Feel free to reach out to me at <a href="mailto:mautorino101@gmail.com">mautorino101@gmail.com</a> or by sending a message through the form below.</p>
        </div>
      </div>
    </div>
  </section>
  {% if messages %}
    {% for message in messages %}
      <div class="alert alert-info">{{ message }}</div>
    {% endfor %}
  {% endif %}
  <form method="post" action="{% url 'submit_message' %}" class="reveal">
    {% csrf_token %}
    <div class="form-group">
      <label for="name">Name:</label>
      <input type="text" class="form-control" id="name" name="name" required>
    </div>
    <div class="form-group">
      <label for="email">Email:</label>
      <input type="email" class="form-control" id="email" name="email" required>
    </div>
    <div class="form-group">
      <label for="message">Message:</label>
      <textarea class="form-control" id="message" name="message" rows="4"></textarea>
    </div>
    <button type="submit" class="btn btn-primary">Send Message</button>
  </form>
{% endblock %}
